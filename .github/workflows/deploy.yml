name: Deploy to GitHub Pages

on:
  push:
    branches: [ 'main' ]

  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: uv sync

      - name: Export notebooks
        run: |
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Dataseka — Open data notebooks</title>
            <meta name="description" content="Interactive notebooks exploring South African public datasets.">
            <link rel="icon" href="https://dataseka.com/favicon.ico">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              :root { --coral: #FF5A5F; --text: #1a1a1a; --muted: #6b7280; --hint: #9ca3af; --border: rgba(0,0,0,0.1); --surface: #f9f9f8; --radius: 12px; }
              body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: var(--text); min-height: 100vh; }
              a { text-decoration: none; color: inherit; }
              nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 0.5px solid var(--border); }
              .nav-logo { display: flex; align-items: center; gap: 10px; }
              .nav-mark { width: 28px; height: 28px; background: var(--coral); border-radius: 6px; display: grid; place-items: center; flex-shrink: 0; }
              .nav-mark svg { width: 16px; height: 16px; fill: #fff; }
              .nav-name { font-size: 15px; font-weight: 500; }
              .nav-link { font-size: 14px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
              .nav-link:hover { color: var(--text); }
              .hero { padding: 3.5rem 2rem 2.5rem; max-width: 600px; }
              .eyebrow { font-size: 11px; font-weight: 500; color: var(--coral); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.75rem; }
              h1 { font-size: 26px; font-weight: 500; line-height: 1.3; margin-bottom: 0.75rem; }
              .sub { font-size: 15px; color: var(--muted); line-height: 1.65; }
              hr { border: none; border-top: 0.5px solid var(--border); margin: 0 2rem; }
              .notebooks { padding: 2rem 2rem 0; }
              .section-label { font-size: 11px; font-weight: 500; color: var(--hint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
              .card { background: #fff; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: block; transition: border-color 0.15s; }
              .card:hover { border-color: rgba(0,0,0,0.25); }
              .card-icon { width: 32px; height: 32px; border-radius: 8px; background: #fff0f0; display: grid; place-items: center; margin-bottom: 1rem; color: var(--coral); font-size: 16px; }
              .card-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
              .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
              .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 0.75rem; border-top: 0.5px solid var(--border); }
              .tag { font-size: 11px; color: var(--hint); background: var(--surface); padding: 2px 8px; border-radius: 4px; }
              footer { padding: 2rem; margin-top: 3rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
              footer span, footer a { font-size: 12px; color: var(--hint); }
              footer a:hover { color: var(--muted); }
              .NOTEBOOKS_PLACEHOLDER { display: none; }
            </style>
          </head>
          <body>
            <nav>
              <a class="nav-logo" href="https://dataseka.com">
                <div class="nav-mark">
                  <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
                </div>
                <span class="nav-name">Dataseka</span>
              </a>
              <a class="nav-link" href="https://dataseka.com">
                dataseka.com
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>
            </nav>
            <div class="hero">
              <p class="eyebrow">South Africa</p>
              <h1>Open data notebooks</h1>
              <p class="sub">Interactive notebooks exploring South African public datasets. Each notebook ingests, transforms, and visualises data from official sources.</p>
            </div>
            <hr>
            <div class="notebooks">
              <p class="section-label">Available notebooks</p>
              <div class="grid" id="grid"></div>
            </div>
            <footer>
              <span>© 2026 Dataseka (Pty) Limited</span>
              <a href="https://dataseka.com/privacy-policy">Privacy policy</a>
            </footer>
            <script>
              const notebooks = [NOTEBOOKS_JSON];
              const grid = document.getElementById('grid');
              notebooks.forEach(nb => {
                grid.innerHTML += `<a class="card" href="${nb.href}">
                  <div class="card-icon">&#9632;</div>
                  <p class="card-name">${nb.label}</p>
                  <p class="card-desc">${nb.desc}</p>
                  <div class="card-footer"><span class="tag">${nb.tag}</span></div>
                </a>`;
              });
            <\/script>
          </body>
          </html>
          EOF
          
          NOTEBOOKS_JSON=""
          for file in south_africa/*.py; do
            filename=$(basename "$file")
            [ "$filename" = "shared.py" ] && continue
            [ "$filename" = "__init__.py" ] && continue
            name="${filename%.*}"
            uv run marimo export html-wasm "$file" -o "_site/${name}" --mode run
            NOTEBOOKS_JSON="${NOTEBOOKS_JSON}{\"href\":\"${name}/index.html\",\"label\":\"${name}\",\"desc\":\"\",\"tag\":\"StatsSA\"},"
          done
          
          NOTEBOOKS_JSON="[${NOTEBOOKS_JSON%,}]"
          sed -i "s|NOTEBOOKS_JSON|${NOTEBOOKS_JSON}|g" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
